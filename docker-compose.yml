services:
  db:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: cloud-db
    restart: unless-stopped
    environment:
      SA_PASSWORD: "StrongPassword123!"
      MSSQL_SA_PASSWORD: "StrongPassword123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - ./docker/sql-data:/var/opt/mssql
    networks:
      - cloud-network
   
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'timeout 2 bash -c \"cat < /dev/null > /dev/tcp/127.0.0.1/1433\"' || exit 1"]
      interval: 10s
      timeout: 8s
      retries: 15
      start_period: 60s

  api:
    build:
      context: ./backend/CloudTasks.Api
      dockerfile: Dockerfile
    container_name: cloud-api
    restart: unless-stopped
    ports:
      - "5050:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=CloudTasksDb;User Id=sa;Password=StrongPassword123!;TrustServerCertificate=True;"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cloud-network

networks:
  cloud-network:
    driver: bridge

services:
  db:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: cloud-db
    restart: unless-stopped
    environment:
      SA_PASSWORD: "StrongPassword123!"
      MSSQL_SA_PASSWORD: "StrongPassword123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - ./docker/sql-data:/var/opt/mssql
    networks:
      - cloud-network
   
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -q '[s]qlservr' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

  api:
    build:
      context: ./backend/CloudTasks.Api
      dockerfile: Dockerfile
    container_name: cloud-api
    restart: unless-stopped
    ports:
      - "5050:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      # Encrypt=False — Microsoft.Data.SqlClient domyślnie Encrypt=True; między kontenerami często bez poprawnego certyfikatu TLS.
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=CloudTasksDb;User Id=sa;Password=StrongPassword123!;TrustServerCertificate=True;Encrypt=False;Connect Timeout=60;"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cloud-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cloud-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5050
    depends_on:
      - api
    networks:
      - cloud-network

networks:
  cloud-network:
    driver: bridge
